name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/ingjuanocampo/enfila-backend

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1: Build Docker image and push to GitHub Container Registry
  # ──────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────
  # JOB 2: SSH into VPS, pull new image and restart services
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: FIREBASE_JSON,GHCR_TOKEN,ACTOR
          script: |
            set -e

            # Write Firebase credentials to the app directory
            echo "$FIREBASE_JSON" > /opt/enfila/firebase-service-account.json
            chmod 600 /opt/enfila/firebase-service-account.json

            # Authenticate with GitHub Container Registry
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin

            # Pull the latest image and restart services
            cd /opt/enfila
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Remove dangling images to save disk space
            docker image prune -f

            echo "Deployment complete."
