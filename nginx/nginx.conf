events {
    worker_connections 1024;
}

http {
    # Logging
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log;

    # Recommended headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"      always;

    # Upstream Ktor backend
    upstream enfila_backend {
        server backend:8080;
    }

    # ──────────────────────────────────────────────────────────────
    # HTTP — serves traffic on port 80
    # Once SSL is configured, this block should redirect to HTTPS.
    # ──────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check endpoint (bypasses any future auth middleware)
        location /health {
            proxy_pass         http://enfila_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # All other traffic
        location / {
            proxy_pass         http://enfila_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # WebSocket support (if needed in the future)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
        }

        # ──────────────────────────────────────────────────────────
        # HTTPS upgrade — uncomment after running Certbot:
        #
        #   certbot --nginx -d your-domain.com
        #
        # return 301 https://$host$request_uri;
        # ──────────────────────────────────────────────────────────
    }

    # ──────────────────────────────────────────────────────────────
    # HTTPS — uncomment and fill in your domain after Certbot setup
    # ──────────────────────────────────────────────────────────────
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #
    #     location / {
    #         proxy_pass         http://enfila_backend;
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #
    #         proxy_http_version 1.1;
    #         proxy_set_header   Upgrade    $http_upgrade;
    #         proxy_set_header   Connection "upgrade";
    #     }
    # }
}
