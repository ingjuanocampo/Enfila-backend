ktor {
  application {
    modules = [ com.ingjuanocampo.enfila.backend.ApplicationKt.module ]
  }
  development = true
}

database {
  driver = "org.postgresql.Driver"
  url = "jdbc:postgresql://postgres:5432/enfila_db"
  user = "enfila_user"
  password = "enfila_password"
  maxPoolSize = 20
}

firebase {
  credentials = "path/to/firebase-service-account.json"
  projectId = "your-firebase-project-id"
}

twilio {
  baseUrl = "https://api.twilio.com"
  accountSid = ${?TWILIO_SID}
  authToken = ${?TWILIO_TOKEN}
}

server {
  port = 8080
  host = "0.0.0.0"
}

cors {
  allowedHosts = ["localhost:3000", "127.0.0.1:3000", "*"]
  allowedMethods = ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
  allowedHeaders = ["Content-Type", "Authorization"]
}
